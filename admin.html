<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>세븐 미라클 POS</title>
    <style>
        body { background: #2c3e50; color: white; text-align: center; font-family: sans-serif; padding-top: 50px; }
        .order-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: #34495e; padding: 20px; border-radius: 10px; border-left: 10px solid #4ecdc4; text-align: left; }
        #start-btn { padding: 20px 40px; font-size: 20px; cursor: pointer; background: #4ecdc4; border: none; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="setup">
        <h1>🔔 소리 알림 시스템</h1>
        <p>아래 버튼을 누르면 POS가 시작됩니다.</p>
        <button id="start-btn" onclick="startPos()">시스템 시작하기</button>
    </div>

    <div id="main-ui" style="display:none;">
        <h1>SEVEN MIRACLE POS</h1>
        <p>상태: <span id="sync-status">연결됨</span> | 마지막 확인: <span id="time">-</span></p>
        <div class="order-container" id="orders"></div>
    </div>

    <audio id="alarm" src="https://t1.daumcdn.net/kakaopay/tesla/20210105/sounds/pe_talk.mp3" preload="auto"></audio>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx5Ui0FiUhigHzRkXyAartYj7_YKmlDlAs_hbES2gwSGesRsy9pMm-ms50RC8ZY2gqX/exec';
    let count = 0;

    function startPos() {
        // 버튼 누르는 즉시 소리 한 번 강제 재생
        const sound = document.getElementById('alarm');
        sound.play().then(() => {
            sound.pause();
            document.getElementById('setup').style.display = 'none';
            document.getElementById('main-ui').style.display = 'block';
            fetchData();
            setInterval(fetchData, 10000); // 10초마다 확인
        }).catch(e => {
            alert("브라우저 상단 [자물쇠] -> [소리 허용]을 다시 확인해주세요!");
        });
    }

    async function fetchData() {
        try {
            const res = await fetch(SCRIPT_URL + '?t=' + new Date().getTime());
            const data = await res.json();
            const active = data.filter(o => String(o.status).includes("대기중"));

            if (active.length > count) {
                document.getElementById('alarm').play(); // 새 주문 시 소리 재생
            }
            count = active.length;
            render(active);
            document.getElementById('time').textContent = new Date().toLocaleTimeString();
        } catch (e) { console.log(e); }
    }

    function render(orders) {
        const div = document.getElementById('orders');
        div.innerHTML = orders.map(o => `
            <div class="card">
                <h3>TABLE ${o.tableNo}</h3>
                <p>${o.orderDetails}</p>
                <p><strong>${o.totalAmount.toLocaleString()}원</strong></p>
                <button onclick="this.parentElement.remove()" style="width:100%; padding:10px;">완료</button>
            </div>
        `).join('');
    }
</script>
</body>
</html>
