<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seven Miracle Premium POS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #0f172a; color: #f8fafc; margin: 0; padding: 20px; }
        h1 { text-align: center; color: #00d1b2; font-size: 32px; margin-bottom: 30px; font-weight: 700; }
        #orders { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; max-width: 1400px; margin: 0 auto; }
        .order-card { background-color: #1e293b; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid rgba(255,255,255,0.05); position: relative; display: flex; flex-direction: column; gap: 10px; }
        .order-card.unpaid { border: 2px solid #ff4757; background-color: #1e1b24; }
        .time-badge { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.6); color: #ffdd57; padding: 4px 8px; border-radius: 5px; font-size: 13px; font-weight: bold; z-index: 10; }
        .img-container { width: 100%; height: 180px; border-radius: 10px; overflow: hidden; background: #0f172a; border: 1px solid rgba(255,255,255,0.1); }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }
        h3 { margin: 5px 0 0 0; font-size: 24px; color: #f1f5f9; }
        .details { margin: 0; font-size: 18px; font-weight: bold; color: #cbd5e1; }
        .desc { margin: 5px 0; font-size: 14px; color: #94a3b8; font-style: italic; line-height: 1.4; }
        .amount { font-size: 22px; font-weight: bold; color: #00d1b2; margin-top: 5px; }
        button { width: 100%; padding: 12px; background: #ff4757; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; transition: background 0.2s; }
        button:hover { background: #ff6b81; }
        .paid-badge { text-align: center; color: #00d1b2; font-weight: bold; padding: 10px; border: 1px solid #00d1b2; border-radius: 8px; font-size: 16px; }
    </style>
</head>
<body>

    <h1>✨ Seven Miracle Premium POS</h1>
    <div id="orders">
        <p style="text-align:center; grid-column: 1/-1; color:#94a3b8;">주문 데이터를 불러오는 중입니다...</p>
    </div>

    <script>
        // 대표님의 진짜 구글 웹앱 URL 주소
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzooYN47HsQO7PYjUSqSU17Qh7RrNHg3EB3CU7dJRRdR5IM7UTSUbxUCD3AqadRP7Q3qg/exec";

        // 실시간 주문 체크 (5초마다)
        async function checkOrders() {
            try {
                const res = await fetch(`${SCRIPT_URL}?action=getOrders`);
                const data = await res.json();
                render(data);
            } catch (e) {
                console.error("데이터 동기화 실패", e);
            }
        }

        // 결제 완료 처리 함수
        async function markAsPaid(row) {
            if (!confirm("결제 완료 처리하시겠습니까?")) return;
            try {
                const res = await fetch(`${SCRIPT_URL}?action=pay&row=${row}`);
                const result = await res.json();
                if (result.result === "success") {
                    checkOrders();
                }
            } catch (e) {
                alert("통신 오류가 발생했습니다.");
            }
        }

        // 구글 드라이브 주소 무적 변환기
        function getImageUrl(url) {
            if (!url || url === "" || url.trim() === "") {
                return "https://placehold.co/400x300/1e293b/00d1b2?text=Seven+Miracle";
            }
            let fileId = "";
            try {
                if (url.includes("/d/")) {
                    fileId = url.split('/d/')[1].split('/')[0];
                } else if (url.includes("id=")) {
                    fileId = url.split('id=')[1].split('&')[0];
                }
                if (fileId) {
                    return `https://drive.google.com/uc?export=view&id=${fileId}`;
                }
            } catch (e) {}
            return url;
        }

        // 화면에 주문 목록 그려주는 함수
        function render(orders) {
            const div = document.getElementById('orders');
            if (!orders || orders.length === 0) {
                div.innerHTML = '<p style="text-align:center; grid-column:1/-1; color:#94a3b8;">현재 접수된 주문이 없습니다.</p>';
                return;
            }
            
            div.innerHTML = orders.map(o => {
                const isUnpaid = !String(o.payStatus).includes("완료");
                
                // 한국 시간 보정 계산 로직
                let displayTime = "확인중";
                try {
                    const n = String(o.timestamp).match(/\d+/g);
                    if (n && n.length >= 5) {
                        let dt = new Date(n[0], n[1]-1, n[2], n[3], n[4]);
                        dt.setHours(dt.getHours() + 9);
                        displayTime = `${String(dt.getMonth()+1).padStart(2,'0')}/${String(dt.getDate()).padStart(2,'0')} ${String(dt.getHours()).padStart(2,'0')}:${n[4]}`;
                    }
                } catch (e) {}

                return `
                    <div class="order-card ${isUnpaid ? 'unpaid' : ''}">
                        <div class="time-badge">${displayTime}</div>
                        
                        <div class="img-container">
                            <img src="${getImageUrl(o.이미지)}" onerror="this.src='https://placehold.co/400x300/1e293b/00d1b2?text=Seven+Miracle'">
                        </div>
                        
                        <h3>테이블 ${o.tableNo}</h3>
                        <p class="details">${o.orderDetails}</p>
                        <p class="desc">${o.설명 || "세븐 미라클의 정성을 담은 메뉴입니다."}</p>
                        <div class="amount">${Number(o.totalAmount).toLocaleString()}원</div>
                        
                        <div style="margin-top:auto; padding-top:10px;">
                            ${isUnpaid 
                                ? `<button onclick="markAsPaid(${o.row})">💳 결제 완료 처리</button>` 
                                : `<div class="paid-badge">✅ 결제 완료</div>`
                            }
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 페이지 켜지자마자 실행 후 5초마다 새로고침
        checkOrders();
        setInterval(checkOrders, 5000);
    </script>
</body>
</html>
