<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>세븐 미라클 POS - 정밀 동기화</title>
    <style>
        body { background: #121212; color: white; font-family: 'Pretendard', sans-serif; margin: 0; padding: 20px; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 2px solid #333; margin-bottom: 20px; }
        #live-clock { font-size: 32px; font-weight: bold; color: #00d1b2; }
        #orders { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .order-card { background: #252525; border-radius: 15px; padding: 20px; border-top: 10px solid #00d1b2; position: relative; }
        .order-card.unpaid { border-top: 10px solid #ff4757; background: #2d1f1f; }
        .time-badge { position: absolute; top: 15px; right: 20px; font-size: 18px; font-weight: bold; color: #ffdd57; background: rgba(0,0,0,0.3); padding: 2px 8px; border-radius: 5px; }
        .price { font-size: 26px; font-weight: bold; color: #00d1b2; margin-top: 15px; }
        .unpaid .price { color: #ff4757; }
        #setup { text-align: center; margin-top: 150px; }
        #start-btn { padding: 30px 60px; font-size: 24px; background: #00d1b2; color: white; border: none; border-radius: 15px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="setup">
        <h1 style="color:#00d1b2;">SEVEN MIRACLE</h1>
        <button id="start-btn" onclick="activateSystem()">시스템 시작</button>
    </div>

    <div id="main-ui" style="display:none;">
        <header>
            <h1>주문 현황판</h1>
            <div id="live-clock">00:00:00</div>
        </header>
        <div id="orders"></div>
    </div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx5Ui0FiUhigHzRkXyAartYj7_YKmlDlAs_hbES2gwSGesRsy9pMm-ms50RC8ZY2gqX/exec';
    let lastCount = 0;
    let audioCtx = null;

    function activateSystem() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        document.getElementById('setup').style.display = 'none';
        document.getElementById('main-ui').style.display = 'block';
        setInterval(() => {
            document.getElementById('live-clock').textContent = new Date().toLocaleTimeString('ko-KR', { hour12: false });
        }, 1000);
        checkOrders();
        setInterval(checkOrders, 5000);
    }

    function playTone(f, d) {
        if(!audioCtx) return;
        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.frequency.value = f; g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + d);
        o.start(); o.stop(audioCtx.currentTime + d);
    }

    async function checkOrders() {
        try {
            const res = await fetch(SCRIPT_URL + '?t=' + new Date().getTime());
            const data = await res.json();
            const activeOrders = data.filter(o => String(o.status).includes("대기중"));
            if (activeOrders.length > lastCount) {
                const latest = activeOrders[activeOrders.length - 1];
                if (String(latest.payStatus).includes("완료")) {
                    playTone(659, 0.5); setTimeout(() => playTone(523, 0.5), 200);
                } else {
                    playTone(392, 0.3); setTimeout(() => playTone(392, 0.3), 300);
                }
            }
            lastCount = activeOrders.length;
            render(activeOrders);
        } catch (e) { console.log("Error"); }
    }

   function render(orders) {
    const div = document.getElementById('orders');
    div.innerHTML = orders.map(o => {
        const isUnpaid = !String(o.payStatus).includes("완료");
        
        // ★ 날짜와 시간을 모두 추출하는 마법 ★
        let displayDateTime = "확인중";
        try {
            const raw = String(o.timestamp);
            const n = raw.match(/\d+/g); // 숫자 싹 다 뽑기 [2026, 05, 15, 19, 30, ...]
            
            if (n && n.length >= 5) {
                let mm = n[1]; // 월
                let dd = n[2]; // 일
                let hh = (parseInt(n[3]) + 9) % 24; // 한국 시간 보정
                let min = n[4]; // 분
                
                const hhStr = hh < 10 ? '0' + hh : hh;
                
                // 표시 형식: "05/15 04:30"
                displayDateTime = `${mm}/${dd} ${hhStr}:${min}`;
            }
        } catch (e) {
            displayDateTime = "날짜 오류";
        }

        return `
            <div class="order-card ${isUnpaid ? 'unpaid' : ''}">
                <div class="time-badge">${displayDateTime}</div>
                <h3 style="margin:0;">테이블 ${o.tableNo}</h3>
                <p style="margin:20px 0; font-size:18px;">${o.orderDetails}</p>
                <div class="price">${o.totalAmount.toLocaleString()}원</div>
                <div style="font-weight:bold; color:${isUnpaid ? '#ff4757' : '#00d1b2'}">
                    ${isUnpaid ? '⚠️ 현장결제' : '✅ 결제완료'}
                </div>
            </div>
        `;
    }).join('');
}
</script>
</body>
</html>
