<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>세븐 미라클 POS - 정밀 시간 모드</title>
    <style>
        body { background: #121212; color: white; font-family: 'Pretendard', sans-serif; margin: 0; padding: 20px; }
        #setup { text-align: center; padding-top: 150px; }
        #start-btn { padding: 30px 60px; font-size: 24px; cursor: pointer; background: #00d1b2; border: none; border-radius: 15px; color: white; font-weight: bold; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; border-bottom: 2px solid #333; margin-bottom: 20px; }
        #live-clock { font-size: 32px; font-weight: bold; color: #00d1b2; }
        #orders { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .order-card { background: #252525; border-radius: 15px; padding: 20px; border-top: 10px solid #00d1b2; position: relative; }
        .order-card.unpaid { border-top: 10px solid #ff4757; background: #2d1f1f; }
        .time-badge { position: absolute; top: 15px; right: 20px; font-size: 16px; font-weight: bold; color: #ffdd57; } /* 시간 강조 */
        .order-details { margin: 25px 0; font-size: 18px; min-height: 60px; line-height: 1.5; }
        .price { font-size: 24px; font-weight: bold; color: #00d1b2; }
        .unpaid .price { color: #ff4757; }
    </style>
</head>
<body>

    <div id="setup">
        <h1 style="color:#00d1b2;">SEVEN MIRACLE</h1>
        <p>정밀 시간 동기화 모드를 시작합니다.</p><br>
        <button id="start-btn" onclick="activateSystem()">시스템 시작</button>
    </div>

    <div id="main-ui" style="display:none;">
        <header>
            <div>
                <h1 style="margin:0;">주문 현황판</h1>
                <p id="last-update" style="margin:5px 0; color:#666;">데이터 연결 중...</p>
            </div>
            <div id="live-clock">00:00:00</div>
        </header>
        <div id="orders"></div>
    </div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx5Ui0FiUhigHzRkXyAartYj7_YKmlDlAs_hbES2gwSGesRsy9pMm-ms50RC8ZY2gqX/exec';
    let lastCount = 0;
    let audioCtx = null;

    function activateSystem() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        document.getElementById('setup').style.display = 'none';
        document.getElementById('main-ui').style.display = 'block';
        setInterval(() => {
            document.getElementById('live-clock').textContent = new Date().toLocaleTimeString('ko-KR', { hour12: false });
        }, 1000);
        checkOrders();
        setInterval(checkOrders, 5000); 
    }

    function playTone(freq, dur) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.value = freq;
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
        osc.start(); osc.stop(audioCtx.currentTime + dur);
    }

    async function checkOrders() {
        try {
            const res = await fetch(SCRIPT_URL + '?t=' + new Date().getTime());
            const data = await res.json();
            const activeOrders = data.filter(o => String(o.status).includes("대기중"));

            if (activeOrders.length > lastCount) {
                const latest = activeOrders[activeOrders.length - 1];
                if (String(latest.payStatus).includes("완료")) {
                    playTone(659, 0.5); setTimeout(() => playTone(523, 0.5), 200);
                } else {
                    playTone(392, 0.3); setTimeout(() => playTone(392, 0.3), 300);
                }
            }
            lastCount = activeOrders.length;
            render(activeOrders);
            document.getElementById('last-update').textContent = "마지막 업데이트: " + new Date().toLocaleTimeString();
        } catch (e) { console.log("데이터 수신 오류"); }
    }

    // ★★★ 정밀 시간 변환 핵심 함수 ★★★
    function render(orders) {
        const div = document.getElementById('orders');
        div.innerHTML = orders.map(o => {
            const isUnpaid = !String(o.payStatus).includes("완료");
            
            // 1. 서버에서 온 시간 문자열 (예: 2026-05-14T19:20:55)
            const rawTime = String(o.timestamp);
            let displayTime = "시간 확인중";

            if (rawTime.includes('T')) {
                // 2. T를 기준으로 날짜와 시간 분리
                const parts = rawTime.split('T');
                const timePart = parts[1].split('.')[0]; // "19:20:55"
                const [h, m, s] = timePart.split(':');

                // 3. 숫자로 변환해서 강제로 9시간 더하기 (한국 시간 보정)
                let korHour = (parseInt(h) + 9) % 24;
                const korHourStr = korHour < 10 ? '0' + korHour : korHour;
                
                displayTime = `${korHourStr}:${m}:${s}`; // "04:20:55" 완성!
            }

            return `
                <div class="order-card ${isUnpaid ? 'unpaid' : ''}">
                    <div class="time-badge">${displayTime}</div>
                    <h3 style="margin:0;">테이블 ${o.tableNo}</h3>
                    <div class="order-details">${o.orderDetails}</div>
                    <div class="price">${o.totalAmount.toLocaleString()}원</div>
                    <div style="margin-top:10px; font-weight:bold; color:${isUnpaid ? '#ff4757' : '#00d1b2'}">
                        ${isUnpaid ? '⚠️ 현장결제 필요' : '✅ 결제완료'}
                    </div>
                </div>
            `;
        }).join('');
    }
</script>
</body>
</html>
