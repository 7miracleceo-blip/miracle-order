<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트 오더 - 관리자 대시보드</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #2c3e50;
            color: #ecf0f1;
        }
        header {
            background-color: #1a252f;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        header h1 {
            margin: 0;
            font-size: 1.5rem;
        }
        .status-bar {
            font-size: 0.9rem;
            color: #bdc3c7;
        }
        .container {
            padding: 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }
        .order-card {
            background-color: #34495e;
            border-radius: 8px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            position: relative;
            transition: transform 0.2s;
        }
        .order-card:hover {
            transform: translateY(-5px);
        }
        
        /* 먹튀 방지 신호등 UI */
        .bg-red { background-color: #e74c3c !important; color: white; } /* 카운터 후불 */
        .bg-yellow { background-color: #f1c40f !important; color: #333; } /* 계좌 이체 */
        .bg-green { background-color: #2ecc71 !important; color: white; } /* 간편 송금 */
        
        .order-header {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 0.5rem;
            margin-bottom: 1rem;
        }
        .table-no {
            font-size: 1.5rem;
            font-weight: bold;
        }
        .time {
            font-size: 0.9rem;
            opacity: 0.8;
        }
        .order-details {
            font-size: 1.1rem;
            line-height: 1.5;
            margin-bottom: 1rem;
            min-height: 60px;
        }
        .order-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(255,255,255,0.2);
        }
        .total-amount {
            font-size: 1.2rem;
            font-weight: bold;
        }
        .payment-method {
            font-size: 0.9rem;
            padding: 3px 8px;
            border-radius: 4px;
            background: rgba(0,0,0,0.2);
        }
        .action-btn {
            width: 100%;
            padding: 10px;
            margin-top: 1rem;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            background-color: rgba(255,255,255,0.9);
            color: #333;
        }
        .action-btn:hover {
            background-color: white;
        }
        
        /* 오디오 생성을 위한 숨김 요소 */
        #audio-container {
            display: none;
        }
    </style>
</head>
<body>

<header>
    <h1>POS 대시보드</h1>
    <div class="status-bar">
        마지막 업데이트: <span id="last-update">-</span> | 
        <button onclick="fetchOrders()" style="padding:5px 10px; cursor:pointer;">새로고침</button>
    </div>
</header>

<div class="container" id="orders-container">
    <!-- 주문 카드들이 여기에 렌더링됩니다 -->
    <div style="grid-column: 1 / -1; text-align: center; padding: 3rem; color: #bdc3c7;">
        주문 데이터를 불러오는 중입니다...
    </div>
</div>

<!-- 사운드 알림용 오디오 요소 -->
<div id="audio-container">
    <!-- 선결제(송금)용 밝은 소리 -->
    <audio id="sound-prepaid" src="https://actions.google.com/sounds/v1/alarms/ding_dong.ogg" preload="auto"></audio>
    <!-- 후결제용 경고 소리 -->
    <audio id="sound-postpaid" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" preload="auto"></audio>
</div>

<script>
    // 구글 앱스 스크립트 웹앱 URL (배포 후 변경 필요)
// 이 줄 하나만 정확하게 남기시면 됩니다!
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxlMAZqwyMdFkLAC5vAprl70oZfrXI1lDeyjG2WwqLM8FVHH-9kbNp0-JN-0ZAHuCeupQ/exec';
    
    let lastOrderCount = 0;
    let isFirstLoad = true;

    // 주문 데이터 가져오기
    async function fetchOrders() {
        try {
            // SCRIPT_URL이 설정되지 않은 경우 테스트 데이터 사용
            if(SCRIPT_URL === 'YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL') {
                renderTestOrders();
                return;
            }

            const response = await fetch(SCRIPT_URL);
            const data = await response.json();
            
            // 대기중인 주문만 필터링
            const activeOrders = data.filter(order => order.status === '대기중');
            
            // 새 주문 알림 체크
            if (!isFirstLoad && activeOrders.length > lastOrderCount) {
                // 가장 최근 주문의 결제 방식 확인
                const latestOrder = activeOrders[activeOrders.length - 1];
                playSound(latestOrder.paymentMethod);
            }
            
            lastOrderCount = activeOrders.length;
            isFirstLoad = false;
            
            renderOrders(activeOrders);
            
            document.getElementById('last-update').textContent = new Date().toLocaleTimeString();
            
        } catch (error) {
            console.error('주문 데이터를 가져오는데 실패했습니다:', error);
        }
    }

    // 사운드 재생 함수
    function playSound(paymentMethod) {
        try {
            if (paymentMethod === '카운터 후불 결제') {
                document.getElementById('sound-postpaid').play();
            } else {
                document.getElementById('sound-prepaid').play();
            }
        } catch (e) {
            console.log('오디오 재생 실패 (브라우저 정책일 수 있음):', e);
        }
    }

    // 주문 렌더링
    function renderOrders(orders) {
        const container = document.getElementById('orders-container');
        
        if (orders.length === 0) {
            container.innerHTML = '<div style="grid-column: 1 / -1; text-align: center; padding: 3rem; color: #bdc3c7;">현재 대기중인 주문이 없습니다.</div>';
            return;
        }
        
        container.innerHTML = '';
        
        // 최신 주문이 먼저 보이도록 역순 정렬
        orders.reverse().forEach(order => {
            const card = document.createElement('div');
            card.className = 'order-card';
            
            // 결제 방식에 따른 배경색 클래스 할당 (신호등 UI)
            let bgClass = '';
            let btnText = '처리 완료';
            
            if (order.paymentMethod === '카운터 후불 결제') {
                bgClass = 'bg-red';
                btnText = '결제 및 처리 완료';
            } else if (order.paymentMethod === '계좌 이체') {
                bgClass = 'bg-yellow';
                btnText = '입금 확인 및 처리 완료';
            } else if (order.paymentMethod === '간편 송금') {
                bgClass = 'bg-green';
                btnText = '입금 확인 및 처리 완료';
            }
            
            card.classList.add(bgClass);
            
            // 시간 포맷팅
            const orderTime = new Date(order.timestamp);
            const timeStr = `${orderTime.getHours().toString().padStart(2, '0')}:${orderTime.getMinutes().toString().padStart(2, '0')}`;
            
            card.innerHTML = `
                <div class="order-header">
                    <span class="table-no">Table ${order.tableNo}</span>
                    <span class="time">${timeStr}</span>
                </div>
                <div class="order-details">
                    ${order.orderDetails.replace(/, /g, '<br>')}
                </div>
                <div class="order-footer">
                    <span class="total-amount">${Number(order.totalAmount).toLocaleString()}원</span>
                    <span class="payment-method">${order.paymentMethod}</span>
                </div>
                <button class="action-btn" onclick="completeOrder(${order.id}, this)">${btnText}</button>
            `;
            
            container.appendChild(card);
        });
    }

    // 주문 처리 완료 (실제 구현시에는 서버로 상태 업데이트 요청을 보내야 함)
    function completeOrder(orderId, btnElement) {
        if(confirm('이 주문을 처리 완료하시겠습니까?')) {
            // UI에서 즉시 제거
            const card = btnElement.closest('.order-card');
            card.style.opacity = '0';
            setTimeout(() => {
                card.remove();
                lastOrderCount--;
                
                // 남은 카드가 없으면 메시지 표시
                if(document.querySelectorAll('.order-card').length === 0) {
                    document.getElementById('orders-container').innerHTML = 
                        '<div style="grid-column: 1 / -1; text-align: center; padding: 3rem; color: #bdc3c7;">현재 대기중인 주문이 없습니다.</div>';
                }
            }, 300);
            
            // TODO: 실제 환경에서는 Code.gs에 POST 요청을 보내 해당 행의 상태를 '완료'로 변경하는 로직 추가 필요
            console.log(`주문 ID ${orderId} 처리 완료 요청`);
        }
    }

    // 테스트용 데이터 렌더링 함수
    function renderTestOrders() {
        const testData = [
            { id: 1, timestamp: new Date(Date.now() - 10000).toISOString(), tableNo: "3", orderDetails: "아메리카노 2개, 초코케이크 1개", totalAmount: 11500, paymentMethod: "간편 송금", status: "대기중" },
            { id: 2, timestamp: new Date(Date.now() - 5000).toISOString(), tableNo: "5", orderDetails: "카페라떼 1개", totalAmount: 3500, paymentMethod: "계좌 이체", status: "대기중" },
            { id: 3, timestamp: new Date().toISOString(), tableNo: "1", orderDetails: "바닐라라떼 2개", totalAmount: 8000, paymentMethod: "카운터 후불 결제", status: "대기중" }
        ];
        
        if (!isFirstLoad && testData.length > lastOrderCount) {
            playSound(testData[testData.length - 1].paymentMethod);
        }
        
        lastOrderCount = testData.length;
        isFirstLoad = false;
        
        renderOrders(testData);
        document.getElementById('last-update').textContent = new Date().toLocaleTimeString() + ' (테스트 모드)';
    }

    // 10초마다 주기적으로 주문 확인 (Polling)
    setInterval(fetchOrders, 10000);
    
    // 초기 로드
    window.onload = () => {
        // 브라우저 자동 재생 정책 우회를 위해 첫 클릭 시 오디오 컨텍스트 초기화 유도
        document.body.addEventListener('click', function initAudio() {
            document.getElementById('sound-prepaid').load();
            document.getElementById('sound-postpaid').load();
            document.body.removeEventListener('click', initAudio);
        }, { once: true });
        
        fetchOrders();
    };
</script>

</body>
</html>
