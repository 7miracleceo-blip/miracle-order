<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트 오더 - 관리자 대시보드</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background-color: #2c3e50; color: #ecf0f1; }
        header { background-color: #1a252f; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        header h1 { margin: 0; font-size: 1.5rem; }
        .status-bar { font-size: 0.9rem; color: #bdc3c7; }
        .container { padding: 2rem; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }
        .order-card { background-color: #34495e; border-radius: 8px; padding: 1.5rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); position: relative; transition: transform 0.2s; }
        .order-card:hover { transform: translateY(-5px); }
        .bg-red { background-color: #e74c3c !important; color: white; }
        .bg-yellow { background-color: #f1c40f !important; color: #333; }
        .bg-green { background-color: #2ecc71 !important; color: white; }
        .order-header { display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 0.5rem; margin-bottom: 1rem; }
        .table-no { font-size: 1.5rem; font-weight: bold; }
        .time { font-size: 0.9rem; opacity: 0.8; }
        .order-details { font-size: 1.1rem; line-height: 1.5; margin-bottom: 1rem; min-height: 60px; }
        .order-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.2); }
        .total-amount { font-size: 1.2rem; font-weight: bold; }
        .payment-method { font-size: 0.9rem; padding: 3px 8px; border-radius: 4px; background: rgba(0,0,0,0.2); }
        .action-btn { width: 100%; padding: 10px; margin-top: 1rem; border: none; border-radius: 4px; font-size: 1rem; font-weight: bold; cursor: pointer; background-color: rgba(255,255,255,0.9); color: #333; }
        .action-btn:hover { background-color: white; }
        #audio-container { display: none; }
    </style>
</head>
<body>

<header>
    <h1>POS 대시보드</h1>
    <div class="status-bar">
        마지막 업데이트: <span id="last-update">-</span> | 
        <button onclick="fetchOrders()" style="padding:5px 10px; cursor:pointer;">새로고침</button>
    </div>
</header>

<div class="container" id="orders-container">
    <div style="grid-column: 1 / -1; text-align: center; padding: 3rem; color: #bdc3c7;">
        주문 데이터를 불러오는 중입니다...
    </div>
</div>

<div id="audio-container">
    <audio id="sound-prepaid" src="https://actions.google.com/sounds/v1/alarms/ding_dong.ogg" preload="auto"></audio>
    <audio id="sound-postpaid" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" preload="auto"></audio>
</div>

<script>
    // 대표님의 실제 구글 스크립트 주소
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzooYN47HsQO7PYjUSqSU17Qh7RrNHg3EB3CU7dJRRdR5IM7UTSUbxUCD3AqadRP7Q3qg/exec';
    
    let lastOrderCount = 0;
    let isFirstLoad = true;

    async function fetchOrders() {
        try {
            const response = await fetch(SCRIPT_URL);
            const data = await response.json();
            
            if (!data || data.length === 0) {
                document.getElementById('orders-container').innerHTML = '<div style="grid-column: 1 / -1; text-align: center; padding: 3rem; color: #bdc3c7;">현재 시트에 데이터가 없습니다.</div>';
                return;
            }

            // [무적 필터링] 어떤 열이든 '대기중'이라는 글자가 있으면 주문으로 인식
            const activeOrders = data.filter(order => {
                return Object.values(order).some(val => String(val).trim() === "대기중");
            });
            
            if (!isFirstLoad && activeOrders.length > lastOrderCount) {
                const latestOrder = activeOrders[activeOrders.length - 1];
                playSound(latestOrder.paymentMethod);
            }
            
            lastOrderCount = activeOrders.length;
            isFirstLoad = false;
            renderOrders(activeOrders);
            document.getElementById('last-update').textContent = new Date().toLocaleTimeString();
            
        } catch (error) {
            console.error('오류:', error);
            document.getElementById('orders-container').innerHTML = `<div style="color:red; text-align:center; padding:20px;">데이터 연결 오류: ${error.message}</div>`;
        }
    }

    function playSound(paymentMethod) {
        try {
            if (paymentMethod === '카운터 후불 결제') {
                document.getElementById('sound-postpaid').play();
            } else {
                document.getElementById('sound-prepaid').play();
            }
        } catch (e) {}
    }

    function renderOrders(orders) {
        const container = document.getElementById('orders-container');
        if (orders.length === 0) {
            container.innerHTML = '<div style="grid-column: 1 / -1; text-align: center; padding: 3rem; color: #bdc3c7;">현재 대기중인 주문이 없습니다.</div>';
            return;
        }
        
        container.innerHTML = '';
        orders.reverse().forEach(order => {
            const card = document.createElement('div');
            card.className = 'order-card';
            
            let bgClass = '';
            let btnText = '처리 완료';
            const method = order.paymentMethod || "";
            
            if (method.includes('후불')) { bgClass = 'bg-red'; btnText = '결제 및 처리 완료'; }
            else if (method.includes('계좌')) { bgClass = 'bg-yellow'; btnText = '입금 확인 및 완료'; }
            else if (method.includes('송금')) { bgClass = 'bg-green'; btnText = '입금 확인 및 완료'; }
            
            card.classList.add(bgClass);
            const timeStr = order.timestamp ? new Date(order.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : "-";
            
            card.innerHTML = `
                <div class="order-header">
                    <span class="table-no">Table ${order.tableNo || "?"}</span>
                    <span class="time">${timeStr}</span>
                </div>
                <div class="order-details">${(order.orderDetails || "내역 없음").replace(/, /g, '<br>')}</div>
                <div class="order-footer">
                    <span class="total-amount">${Number(order.totalAmount || 0).toLocaleString()}원</span>
                    <span class="payment-method">${order.paymentMethod || "미정"}</span>
                </div>
                <button class="action-btn" onclick="completeOrder(${order.id}, this)">${btnText}</button>
            `;
            container.appendChild(card);
        });
    }

    function completeOrder(orderId, btnElement) {
        if(confirm('이 주문을 처리 완료하시겠습니까?')) {
            const card = btnElement.closest('.order-card');
            card.style.opacity = '0';
            setTimeout(() => {
                card.remove();
                if(document.querySelectorAll('.order-card').length === 0) {
                    document.getElementById('orders-container').innerHTML = '<div style="grid-column: 1 / -1; text-align: center; padding: 3rem; color: #bdc3c7;">현재 대기중인 주문이 없습니다.</div>';
                }
            }, 300);
        }
    }

    setInterval(fetchOrders, 10000);
    window.onload = () => {
        document.body.addEventListener('click', function initAudio() {
            document.getElementById('sound-prepaid').load();
            document.getElementById('sound-postpaid').load();
            document.body.removeEventListener('click', initAudio);
        }, { once: true });
        fetchOrders();
    };
</script>
</body>
</html>
