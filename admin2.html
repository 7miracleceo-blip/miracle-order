<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seven Miracle Premium POS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #0f172a; color: #f8fafc; margin: 0; padding: 20px; }
        h1 { text-align: center; color: #00d1b2; font-size: 32px; margin-bottom: 30px; font-weight: 700; }
        #orders { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; max-width: 1400px; margin: 0 auto; }
        .order-card { background-color: #1e293b; border-radius: 12px; padding: 25px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid rgba(255,255,255,0.05); position: relative; display: flex; flex-direction: column; gap: 12px; }
        .order-card.unpaid { border: 2px solid #ff4757; background-color: #1e1b24; }
        .time-badge { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.6); color: #ffdd57; padding: 4px 8px; border-radius: 5px; font-size: 13px; font-weight: bold; }
        h3 { margin: 0; font-size: 26px; color: #00d1b2; font-weight: 700; }
        .details { margin: 5px 0; font-size: 22px; font-weight: bold; color: #f1f5f9; line-height: 1.4; }
        .pay-method { font-size: 14px; color: #94a3b8; margin: 0; }
        .amount { font-size: 24px; font-weight: bold; color: #ffdd57; margin-top: 10px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px; }
        button { width: 100%; padding: 14px; background: #ff4757; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; transition: background 0.2s; }
        button:hover { background: #ff6b81; }
        .paid-badge { text-align: center; color: #00d1b2; font-weight: bold; padding: 12px; border: 1px solid #00d1b2; border-radius: 8px; font-size: 16px; background: rgba(0,209,178,0.1); }
    </style>
</head>
<body>

    <h1>✨ Seven Miracle Premium POS (실시간 주방·카운터)</h1>
    <div id="orders">
        <p style="text-align:center; grid-column: 1/-1; color:#94a3b8;">주문 데이터를 동기화 중입니다...</p>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyvf3Mu-p8lkNgt1a3k9XVO8-HWZ8jIc6s_bA3Wa0Gyr8ENmud6D9iDuCj0QQB6g5iNVw/exec";
        let lastOrderCount = 0;

        // 🔊 띵동 실시간 포스 소리 시스템 탑재
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playChime() {
            try {
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(587.33, audioCtx.currentTime); 
                osc.frequency.setValueAtTime(880.00, audioCtx.currentTime + 0.12); 
                gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 0.5);
            } catch (e) {}
        }

        async function checkOrders() {
            try {
                const res = await fetch(`${SCRIPT_URL}?action=getOrders`);
                const data = await res.json();
                if (lastOrderCount > 0 && data.length > lastOrderCount) { playChime(); }
                lastOrderCount = data.length;
                render(data);
            } catch (e) {
                document.getElementById('orders').innerHTML = `<p style="text-align:center; grid-column:1/-1; color:#ff4757;">서버 데이터 동기화 대기 중...</p>`;
            }
        }

        async function markAsPaid(row) {
            if (!confirm("결제 완료 처리하시겠습니까?")) return;
            try {
                const res = await fetch(`${SCRIPT_URL}?action=pay&row=${row}`);
                const result = await res.json();
                if (result.result === "success") { checkOrders(); }
            } catch (e) { alert("통신 오류가 발생했습니다."); }
        }

        function render(orders) {
            const div = document.getElementById('orders');
            if (!orders || orders.length === 0) {
                div.innerHTML = '<p style="text-align:center; grid-column:1/-1; color:#94a3b8;">현재 접수된 주문이 없습니다.</p>';
                return;
            }
            
            div.innerHTML = orders.map(o => {
                const orderDetailsText = String(o.주문내역 || o.orderDetails || "");
                const payStatusText = String(o.결제상태 || o.결재상태 || o.payStatus || "대기중");
                const tableNoText = o.테이블번호 || o.tableNo || "1";
                const totalAmountText = o.합계금액 || o.totalAmount || 0;
                const timestampText = o.타임스탬프 || o.timestamp || "";
                const payMethodText = o.결제방식 || "미지정";

                const isUnpaid = !payStatusText.includes("완료");
                
                let displayTime = "실시간";
                try {
                    const n = String(timestampText).match(/\d+/g);
                    if (n && n.length >= 5) {
                        let dt = new Date(n[0], n[1]-1, n[2], n[3], n[4]);
                        dt.setHours(dt.getHours() + 9);
                        displayTime = `${String(dt.getMonth()+1).padStart(2,'0')}/${String(dt.getDate()).padStart(2,'0')} ${String(dt.getHours()).padStart(2,'0')}:${n[4]}`;
                    }
                } catch (e) {}

                return `
                    <div class="order-card ${isUnpaid ? 'unpaid' : ''}">
                        <div class="time-badge">${displayTime}</div>
                        <h3>테이블 ${tableNoText}</h3>
                        <p class="details">${orderDetailsText}</p>
                        <p class="pay-method">💳 결제방식: ${payMethodText}</p>
                        <div class="amount">합계: ${Number(totalAmountText).toLocaleString()}원</div>
                        
                        <div style="margin-top:auto; padding-top:5px;">
                            ${isUnpaid 
                                ? `<button onclick="markAsPaid(${o.row})">💳 결제 완료 처리</button>` 
                                : `<div class="paid-badge">✅ 결제 완료</div>`
                            }
                        </div>
                    </div>
                `;
            }).join('');
        }

        window.addEventListener('click', () => { if (audioCtx.state === 'suspended') { audioCtx.resume(); } });
        checkOrders();
        setInterval(checkOrders, 5000);
    </script>
</body>
</html>
