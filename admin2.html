<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seven Miracle Premium POS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #0f172a; color: #f8fafc; margin: 0; padding: 20px; }
        h1 { text-align: center; color: #00d1b2; font-size: 32px; margin-bottom: 30px; font-weight: 700; }
        #orders { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; max-width: 1400px; margin: 0 auto; }
        .order-card { background-color: #1e293b; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid rgba(255,255,255,0.05); position: relative; display: flex; flex-direction: column; gap: 10px; }
        .order-card.unpaid { border: 2px solid #ff4757; background-color: #1e1b24; }
        .time-badge { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.6); color: #ffdd57; padding: 4px 8px; border-radius: 5px; font-size: 13px; font-weight: bold; z-index: 10; }
        .img-container { width: 100%; height: 180px; border-radius: 10px; overflow: hidden; background: #1e293b; border: 1px solid rgba(255,255,255,0.1); position: relative; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }
        h3 { margin: 5px 0 0 0; font-size: 24px; color: #f1f5f9; }
        .details { margin: 0; font-size: 18px; font-weight: bold; color: #cbd5e1; }
        .desc { margin: 5px 0; font-size: 14px; color: #94a3b8; font-style: italic; line-height: 1.4; }
        .amount { font-size: 22px; font-weight: bold; color: #00d1b2; margin-top: 5px; }
        button { width: 100%; padding: 12px; background: #ff4757; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; transition: background 0.2s; }
        button:hover { background: #ff6b81; }
        .paid-badge { text-align: center; color: #00d1b2; font-weight: bold; padding: 10px; border: 1px solid #00d1b2; border-radius: 8px; font-size: 16px; }
    </style>
</head>
<body>

    <h1>✨ Seven Miracle Premium POS</h1>
    <div id="orders">
        <p style="text-align:center; grid-column: 1/-1; color:#94a3b8;">주문 데이터를 안전하게 동기화 중입니다...</p>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxOCk_pXJhftUfj3BMtbhMuqRNK1_z8PNFM1Ji_yUxiVcEcnw6IhHxBtwT3eOdq9yYW-A/exec";
        let lastOrderCount = 0;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playChime() {
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(587.33, audioCtx.currentTime); 
                osc.frequency.setValueAtTime(880.00, audioCtx.currentTime + 0.15); 
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.6);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.6);
            } catch (e) {}
        }

        async function checkOrders() {
            try {
                const res = await fetch(`${SCRIPT_URL}?action=getOrders`);
                const data = await res.json();
                
                if (lastOrderCount > 0 && data.length > lastOrderCount) {
                    playChime();
                }
                lastOrderCount = data.length;
                
                render(data);
            } catch (e) {
                document.getElementById('orders').innerHTML = `<p style="text-align:center; grid-column:1/-1; color:#ff4757;">구글 웹앱 연결 실패</p>`;
            }
        }

        async function markAsPaid(row) {
            if (!confirm("결제 완료 처리하시겠습니까?")) return;
            try {
                const res = await fetch(`${SCRIPT_URL}?action=pay&row=${row}`);
                const result = await res.json();
                if (result.result === "success") {
                    checkOrders();
                }
            } catch (e) {
                alert("통신 오류가 발생했습니다.");
            }
        }

        function render(orders) {
            const div = document.getElementById('orders');
            if (!orders || orders.length === 0) {
                div.innerHTML = '<p style="text-align:center; grid-column:1/-1; color:#94a3b8;">현재 접수된 주문이 없습니다.</p>';
                return;
            }
            
            div.innerHTML = orders.map(o => {
                // 💡 구글 서버 통신 규격(영어)과 데이터 매핑 일치화
                const orderDetailsText = String(o.orderDetails || o.주문내역 || "");
                const payStatusText = String(o.payStatus || o.결제상태 || o.결재상태 || "");
                const tableNoText = o.tableNo || o.테이블번호 || "1";
                const totalAmountText = o.totalAmount || o.합계금액 || 0;
                const timestampText = o.timestamp || o.타임스탬프 || "";

                const isUnpaid = !payStatusText.includes("완료");
                
                let displayTime = "실시간";
                try {
                    const n = String(timestampText).match(/\d+/g);
                    if (n && n.length >= 5) {
                        let dt = new Date(n[0], n[1]-1, n[2], n[3], n[4]);
                        dt.setHours(dt.getHours() + 9);
                        displayTime = `${String(dt.getMonth()+1).padStart(2,'0')}/${String(dt.getDate()).padStart(2,'0')} ${String(dt.getHours()).padStart(2,'0')}:${n[4]}`;
                    }
                } catch (e) {}

                let finalImg = "";
                const orderText = orderDetailsText.replace(/\s+/g, "");

                // 💡 이미지 필터 독립 검색 및 매칭 로직 탑재
                if (orderText.includes("바닐라")) {
                    finalImg = "https://images.unsplash.com/photo-1594911774802-8822a707cbb3?q=80&w=500";
                } else if (orderText.includes("아메리카노")) {
                    finalImg = "https://images.unsplash.com/photo-1509042239860-f550ce710b93?q=80&w=500";
                } else if (orderText.includes("케익") || orderText.includes("케이크") || orderText.includes("초코")) {
                    finalImg = "https://images.unsplash.com/photo-1606313564200-e75d5e30476c?q=80&w=500";
                } else if (orderText.includes("카페라떼") || orderText.includes("라떼")) {
                    finalImg = "https://images.unsplash.com/photo-1541167760496-1628856ab772?q=80&w=500";
                } else {
                    finalImg = "https://images.unsplash.com/photo-1541167760496-1628856ab772?q=80&w=500";
                }

                return `
                    <div class="order-card ${isUnpaid ? 'unpaid' : ''}">
                        <div class="time-badge">${displayTime}</div>
                        
                        <div class="img-container">
                            <img src="${finalImg}" onerror="this.src='https://images.unsplash.com/photo-1541167760496-1628856ab772?q=80&w=500'">
                        </div>
                        
                        <h3>테이블 ${tableNoText}</h3>
                        <p class="details">${orderDetailsText}</p>
                        <p class="desc">${o.설명 || "세븐 미라클의 정성을 담은 메뉴입니다."}</p>
                        <div class="amount">${Number(totalAmountText).toLocaleString()}원</div>
                        
                        <div style="margin-top:auto; padding-top:10px;">
                            ${isUnpaid 
                                ? `<button onclick="markAsPaid(${o.row})">💳 결제 완료 처리</button>` 
                                : `<div class="paid-badge">✅ 결제 완료</div>`
                            }
                        </div>
                    </div>
                `;
            }).join('');
        }

        window.addEventListener('click', () => {
            if (audioCtx.state === 'suspended') { audioCtx.resume(); }
        });

        checkOrders();
        setInterval(checkOrders, 5000);
    </script>
</body>
</html>
