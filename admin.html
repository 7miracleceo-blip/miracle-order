<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>세븐 미라클 - POS 대시보드</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background-color: #2c3e50; color: #ecf0f1; }
        header { background-color: #1a252f; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        header h1 { margin: 0; font-size: 1.5rem; color: #4ecdc4; }
        .status-bar { font-size: 0.9rem; color: #bdc3c7; }
        .container { padding: 2rem; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }
        .order-card { background-color: #34495e; border-radius: 12px; padding: 1.5rem; box-shadow: 0 6px 12px rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); }
        .bg-red { border-left: 8px solid #e74c3c; } 
        .bg-yellow { border-left: 8px solid #f1c40f; } 
        .bg-green { border-left: 8px solid #2ecc71; } 
        .order-header { display: flex; justify-content: space-between; margin-bottom: 1rem; }
        .table-no { font-size: 1.8rem; font-weight: bold; }
        .order-details { font-size: 1.2rem; margin-bottom: 1rem; color: #ecf0f1; }
        .action-btn { width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; background-color: #4ecdc4; border: none; }
        
        /* 소리 활성화 안내창 */
        #audio-unlock {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1000;
        }
        #audio-unlock button {
            padding: 20px 40px; font-size: 1.5rem; font-weight: bold;
            background: #4ecdc4; border: none; border-radius: 50px; cursor: pointer;
        }
    </style>
</head>
<body>

<div id="audio-unlock">
    <h2 style="color:white; margin-bottom: 20px;">POS 시스템을 시작합니다</h2>
    <button onclick="unlockAudio()">주문 알림음 활성화</button>
    <p style="color:#bdc3c7; margin-top:15px;">버튼을 누르면 "띵동" 소리와 함께 시작됩니다.</p>
</div>

<header>
    <h1>SEVEN MIRACLE POS</h1>
    <div class="status-bar">
        업데이트: <span id="last-update">-</span> | 
        <button onclick="fetchOrders()" style="padding:5px 12px; cursor:pointer; background:#4ecdc4; border:none; border-radius:4px;">새로고침</button>
    </div>
</header>

<div class="container" id="orders-container"></div>

<div id="audio-container" style="display:none;">
    <audio id="sound-prepaid" src="https://t1.daumcdn.net/kakaopay/tesla/20210105/sounds/pe_talk.mp3" preload="auto"></audio>
    <audio id="sound-postpaid" src="https://t1.daumcdn.net/kakaopay/tesla/20210105/sounds/pe_success.mp3" preload="auto"></audio>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx5Ui0FiUhigHzRkXyAartYj7_YKmlDlAs_hbES2gwSGesRsy9pMm-ms50RC8ZY2gqX/exec';
    let lastOrderCount = 0;
    let isFirstLoad = true;

    // 소리 권한 풀기 및 첫 테스트
    function unlockAudio() {
        const s1 = document.getElementById('sound-prepaid');
        const s2 = document.getElementById('sound-postpaid');
        s1.play().then(() => {
            s1.pause(); s1.currentTime = 0;
            document.getElementById('audio-unlock').style.display = 'none';
            fetchOrders();
            setInterval(fetchOrders, 10000);
        }).catch(err => alert("소리 권한 오류: 사이트 설정에서 소리를 허용해 주세요."));
    }

    async function fetchOrders() {
        try {
            const response = await fetch(SCRIPT_URL + '?t=' + new Date().getTime());
            const data = await response.json();
            if (!data || data.length === 0) return;

            const activeOrders = data.filter(order => Object.values(order).some(val => String(val).trim() === "대기중"));
            
            if (!isFirstLoad && activeOrders.length > lastOrderCount) {
                const latestOrder = activeOrders[activeOrders.length - 1];
                const sound = (latestOrder.paymentMethod && latestOrder.paymentMethod.includes('후불')) 
                              ? document.getElementById('sound-postpaid') 
                              : document.getElementById('sound-prepaid');
                sound.play().catch(e => console.log("재생 차단됨"));
            }
            
            lastOrderCount = activeOrders.length;
            isFirstLoad = false;
            renderOrders(activeOrders);
            document.getElementById('last-update').textContent = new Date().toLocaleTimeString();
        } catch (e) { console.error(e); }
    }

    function renderOrders(orders) {
        const container = document.getElementById('orders-container');
        container.innerHTML = '';
        [...orders].reverse().forEach(order => {
            const card = document.createElement('div');
            card.className = 'order-card';
            const method = order.paymentMethod || "";
            if (method.includes('후불')) card.classList.add('bg-red');
            else if (method.includes('계좌')) card.classList.add('bg-yellow');
            else card.classList.add('bg-green');
            
            card.innerHTML = `
                <div class="order-header">
                    <span class="table-no">TABLE ${order.tableNo || "?"}</span>
                    <span class="time">${order.timestamp ? new Date(order.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : "-"}</span>
                </div>
                <div class="order-details">${(order.orderDetails || "").replace(/, /g, '<br>')}</div>
                <div class="order-footer" style="display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-size:1.4rem; font-weight:bold; color:#4ecdc4;">${Number(order.totalAmount || 0).toLocaleString()}원</span>
                    <span style="font-size:0.8rem; background:rgba(0,0,0,0.3); padding:3px 8px; border-radius:10px;">${method}</span>
                </div>
                <button class="action-btn" style="margin-top:15px;" onclick="completeOrder(${order.id}, this)">주문 완료</button>
            `;
            container.appendChild(card);
        });
    }

    function completeOrder(orderId, btn) {
        if(confirm('완료 처리하시겠습니까?')) {
            btn.closest('.order-card').remove();
        }
    }
</script>
</body>
</html>
