<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seven Miracle - 모바일 주문</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #0f172a; color: #f8fafc; margin: 0; padding: 0; padding-bottom: 100px; }
        .header { text-align: center; padding: 30px 20px; background: linear-gradient(135deg, #1e293b, #0f172a); border-bottom: 2px solid #00d1b2; }
        .header h1 { color: #00d1b2; margin: 0; font-size: 28px; }
        .table-badge { text-align: center; margin: 15px auto; display: block; width: fit-content; background: #ff4757; padding: 6px 16px; border-radius: 20px; font-weight: bold; font-size: 14px; }
        .menu-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; padding: 20px; max-width: 800px; margin: 0 auto; }
        .menu-card { background: #1e293b; border-radius: 15px; overflow: hidden; display: flex; flex-direction: column; border: 1px solid rgba(255,255,255,0.05); }
        .menu-img { width: 100%; height: 130px; object-fit: cover; }
        .menu-info { padding: 12px; display: flex; flex-direction: column; gap: 5px; flex: 1; }
        .menu-title { font-size: 16px; font-weight: bold; margin: 0; }
        .menu-desc { font-size: 12px; color: #94a3b8; margin: 0; line-height: 1.4; min-height: 34px; }
        .menu-price { font-size: 16px; font-weight: bold; color: #00d1b2; margin-top: auto; }
        .btn-add { width: 100%; padding: 8px; background: #00d1b2; color: #0f172a; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 8px; }
        .cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #1e293b; padding: 20px; border-top: 2px solid #00d1b2; display: flex; justify-content: space-between; align-items: center; max-width: 800px; margin: 0 auto; box-sizing: border-box; }
        .btn-order { padding: 12px 30px; background: #00d1b2; color: #0f172a; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <h1>✨ Seven Miracle</h1>
        <p style="margin:5px 0 0 0; color:#94a3b8; font-size:14px;">Premium Smart Order System</p>
        <span class="table-badge">📍 테이블 <span id="tableNo">1</span> 이용 중</span>
    </div>

    <div class="menu-container">
        <div class="menu-card">
            <img class="menu-img" src="https://images.unsplash.com/photo-1509042239860-f550ce710b93?q=80&w=500">
            <div class="menu-info">
                <p class="menu-title">아메리카노</p>
                <p class="menu-desc">과테말라 안티구아 원두의 깊고 진한 풍미</p>
                <p class="menu-price">3,500원</p>
                <button class="btn-add" onclick="addToCart('아메리카노', 3500)">담기</button>
            </div>
        </div>
        <div class="menu-card">
            <img class="menu-img" src="https://images.unsplash.com/photo-1541167760496-1628856ab772?q=80&w=500">
            <div class="menu-info">
                <p class="menu-title">카페라떼</p>
                <p class="menu-desc">1A등급 신선한 원유와 에스프레소의 부드러운 조화</p>
                <p class="menu-price">4,000원</p>
                <button class="btn-add" onclick="addToCart('카페라떼', 4000)">담기</button>
            </div>
        </div>
        <div class="menu-card">
            <img class="menu-img" src="https://images.unsplash.com/photo-1594911774802-8822a707cbb3?q=80&w=500">
            <div class="menu-info">
                <p class="menu-title">바닐라라떼</p>
                <p class="menu-desc">천연 바닐라 빈 추출물로 깊은 달콤함을 더한 라떼</p>
                <p class="menu-price">4,500원</p>
                <button class="btn-add" onclick="addToCart('바닐라라떼', 4500)">담기</button>
            </div>
        </div>
        <div class="menu-card">
            <img class="menu-img" src="https://images.unsplash.com/photo-1606313564200-e75d5e30476c?q=80&w=500">
            <div class="menu-info">
                <p class="menu-title">초코케이크</p>
                <p class="menu-desc">벨기에산 리얼 초콜릿으로 만든 꾸덕한 디저트</p>
                <p class="menu-price">5,500원</p>
                <button class="btn-add" onclick="addToCart('초코케이크', 5500)">담기</button>
            </div>
        </div>
    </div>

    <div class="cart-bar">
        <div>
            <p style="margin:0; font-size:14px; color:#94a3b8;">선택한 상품 <span id="cartCount">0</span>개</p>
            <p style="margin:5px 0 0 0; font-size:20px; font-weight:bold; color:#00d1b2;"><span id="cartTotal">0</span>원</p>
        </div>
        <button class="btn-order" onclick="submitOrder()">🔔 주문하기</button>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxOCk_pXJhftUfj3BMtbhMuqRNK1_z8PNFM1Ji_yUxiVcEcnw6IhHxBtwT3eOdq9yYW-A/exec";
        let cart = {}; let tableNo = "1";

        try {
            const urlParams = new URLSearchParams(window.location.search);
            if(urlParams.get('table')) {
                tableNo = urlParams.get('table');
                document.getElementById('tableNo').innerText = tableNo;
            }
        } catch(e){}

        function addToCart(name, price) {
            if(cart[name]) { cart[name].count++; } 
            else { cart[name] = { price: price, count: 1 }; }
            updateCartBar();
        }

        function updateCartBar() {
            let count = 0; let total = 0;
            for(let key in cart) { count += cart[key].count; total += (cart[key].price * cart[key].count); }
            document.getElementById('cartCount').innerText = count;
            document.getElementById('cartTotal').innerText = total.toLocaleString();
        }

        async function submitOrder() {
            let details = []; let total = 0;
            for(let key in cart) { details.push(`${key} ${cart[key].count}개`); total += (cart[key].price * cart[key].count); }
            if(details.length === 0) { alert("상품을 담아주세요."); return; }
            const orderStr = details.join(", ");
            if(!confirm(`[테이블 ${tableNo}] ${orderStr} 주문하시겠습니까?`)) return;

            try {
                const res = await fetch(`${SCRIPT_URL}?action=addOrder&tableNo=${tableNo}&orderDetails=${encodeURIComponent(orderStr)}&totalAmount=${total}`);
                alert("주문이 성공적으로 접수되었습니다!");
                cart = {}; updateCartBar();
            } catch(e) { alert("주문을 전송하지 못했습니다."); }
        }
    </script>
</body>
</html>
